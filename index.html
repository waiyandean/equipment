<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Knife Check</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Knife Check"/>
<meta name="theme-color" content="#1a1916"/>
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e0ddd6;--border-strong:#c8c4bb;
  --text:#1a1916;--text-muted:#7a776e;--text-hint:#b0ada5;
  --accent:#1a1916;--accent-fg:#fff;
  --success-bg:#edf7ed;--success-text:#2d6e2d;--success-border:#b2d9b2;
  --warn-bg:#fdf6e3;--warn-text:#8a6500;--warn-border:#f0d88a;
  --danger-bg:#fdecea;--danger-text:#c0392b;--danger-border:#f5b8b3;
  --radius:10px;--radius-sm:6px;--font:'Lexend',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.app-title{font-size:17px;font-weight:400;}
.app-title span{color:var(--text-muted);}
.header-right{display:flex;align-items:center;gap:10px;}
.sync-badge{font-size:12px;font-family:monospace;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--text-muted);}
.content{padding:16px;max-width:640px;margin:0 auto;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-label{font-size:11px;font-family:monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-family:monospace;color:var(--text-muted);margin-bottom:6px;letter-spacing:.03em;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;appearance:none;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.btn{width:100%;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);cursor:pointer;border:none;transition:opacity .15s;}
.btn-primary{background:var(--accent);color:var(--accent-fg);}
.btn-primary:active{opacity:.85;}
.btn-sm{font-size:12px;padding:5px 11px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:var(--font);}
.section-header{display:flex;align-items:center;gap:10px;margin:4px 0 10px;}
.section-title{font-size:11px;font-family:monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.section-line{flex:1;height:1px;background:var(--border);}
.color-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(0,0,0,.15);flex-shrink:0;display:inline-block;}
.check-knife-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;transition:border-color .2s,background .2s;}
.check-knife-card.state-present{border-color:var(--success-border);background:var(--success-bg);}
.check-knife-card.state-damaged{border-color:var(--warn-border);background:var(--warn-bg);}
.check-knife-card.state-missing{border-color:var(--danger-border);background:var(--danger-bg);}
.check-knife-top{display:flex;align-items:center;gap:10px;}
.check-knife-info{flex:1;}
.check-knife-name{font-size:14px;font-weight:500;}
.check-knife-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.check-btn-undo{font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:var(--font);margin-top:10px;}
.issue-form{margin-top:10px;padding-top:10px;}
.production-held-row{display:flex;align-items:flex-start;gap:10px;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:10px 12px;margin-top:8px;}
.production-held-row input[type=checkbox]{width:18px;height:18px;margin-top:1px;flex-shrink:0;accent-color:var(--warn-text);}
.production-held-row label{font-size:13px;color:var(--warn-text);cursor:pointer;line-height:1.4;}
.err{display:none;color:var(--danger-text);background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;margin-bottom:12px;}
.alert-warn{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:12px;color:var(--warn-text);}
.empty{text-align:center;padding:48px 24px;color:var(--text-muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-fg);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;white-space:nowrap;}
.toast.show{opacity:1;}
/* Session type buttons */
.session-type-btn{width:100%;display:flex;align-items:center;gap:14px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;cursor:pointer;font-family:var(--font);text-align:left;transition:border-color .15s,background .15s;}
.session-type-btn:active{background:var(--bg);border-color:var(--border-strong);}
.session-type-label{font-size:16px;font-weight:500;color:var(--text);}
.session-type-sub{font-size:12px;color:var(--text-muted);margin-top:3px;}
.session-type-arrow{font-size:24px;color:var(--text-hint);margin-left:auto;flex-shrink:0;}
/* Context bar */
.session-ctx-bar{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;}
/* Three-state check buttons */
.check-status-btns{display:flex;gap:6px;margin-top:12px;}
.check-status-btn{flex:1;padding:10px 4px;border-radius:var(--radius-sm);font-size:12px;font-family:var(--font);font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);text-align:center;line-height:1.3;}
.check-status-btn:active{opacity:.8;}
.csb-good   {border-color:var(--success-border);color:var(--success-text);background:var(--success-bg);}
.csb-damaged{border-color:var(--warn-border);   color:var(--warn-text);   background:var(--warn-bg);}
.csb-missing{border-color:var(--danger-border); color:var(--danger-text); background:var(--danger-bg);}
.status-icon{font-size:16px;display:block;margin-bottom:3px;}
.status-sub{font-size:10px;font-family:monospace;display:block;opacity:.75;margin-top:2px;}
.submit-summary{font-size:13px;font-family:monospace;color:var(--text-muted);text-align:center;margin-bottom:8px;}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Knife <span>Check</span></div>
  <div class="header-right">
    <div class="sync-badge" id="sync-status">● sheets</div>
  </div>
</header>

<div class="content">

  <!-- STEP 1: Session setup -->
  <div id="check-step1">
    <div class="card">
      <div class="card-label">Session details</div>
      <div class="field-row">
        <div class="field"><label>Date</label><input type="date" id="c-date"/></div>
        <div class="field"><label>Time</label><input type="time" id="c-time"/></div>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>Checked by</label>
        <input type="text" id="c-staff" placeholder="Enter your name"/>
      </div>
    </div>
    <div class="err" id="err-step1"></div>
    <div style="font-size:11px;font-family:monospace;color:var(--text-muted);letter-spacing:.08em;margin-bottom:10px;margin-top:4px;">SELECT CHECK TYPE</div>
    <button class="session-type-btn" onclick="goCheckStep2('opening')">
      <div style="flex:1;min-width:0;">
        <div class="session-type-label">Opening check</div>
        <div class="session-type-sub">Start of production — all knives present?</div>
        <div id="opening-today-status" style="margin-top:5px;"></div>
      </div>
      <div class="session-type-arrow">›</div>
    </button>
    <button class="session-type-btn" onclick="goCheckStep2('closing')">
      <div style="flex:1;min-width:0;">
        <div class="session-type-label">Closing check</div>
        <div class="session-type-sub">End of production — all knives returned?</div>
        <div id="closing-today-status" style="margin-top:5px;"></div>
      </div>
      <div class="session-type-arrow">›</div>
    </button>
  </div>

  <!-- STEP 2: Knife checklist -->
  <div id="check-step2" style="display:none;">
    <div class="session-ctx-bar">
      <button class="btn-sm" onclick="goCheckStep1()" style="flex-shrink:0;">← Back</button>
      <div style="flex:1;min-width:0;">
        <div style="font-size:15px;font-weight:500;" id="ctx-type"></div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;" id="ctx-meta"></div>
      </div>
    </div>
    <div class="section-header">
      <span class="section-title">Knife checklist</span>
      <div class="section-line"></div>
      <span id="check-progress" style="font-size:11px;font-family:monospace;color:var(--text-hint);"></span>
    </div>
    <div id="check-no-knives" class="alert-warn" style="display:none;">No knives registered yet — add knives in the Setup page first.</div>
    <div id="check-knife-list"></div>
    <div class="card" style="margin-top:4px;">
      <div class="card-label">Notes <span style="font-size:10px;color:var(--text-hint);">optional</span></div>
      <textarea id="c-notes" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);outline:none;resize:vertical;min-height:64px;background:var(--surface);color:var(--text);" placeholder="Any additional observations…"></textarea>
    </div>
    <div class="err" id="err-check"></div>
    <div class="submit-summary" id="check-summary"></div>
    <button class="btn btn-primary" onclick="submitCheck()">Submit check</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SK_KNIVES   = 'knife_knives_v1';
const SK_CHECKS   = 'knife_checks_v1';
const SK_SETTINGS = 'knife_settings_v1';

const KNIFE_COLORS = {
  red:    {label:'Red',    hex:'#d94a3a'}, orange:{label:'Orange',hex:'#e07a30'},
  yellow: {label:'Yellow', hex:'#c9a620'}, green: {label:'Green', hex:'#4a8c4a'},
  blue:   {label:'Blue',   hex:'#3a7ab8'}, purple:{label:'Purple',hex:'#7a3a9a'},
  brown:  {label:'Brown',  hex:'#7a4a28'}, white: {label:'White', hex:'#c8c4bb'},
  black:  {label:'Black',  hex:'#3a3935'},
};

let knives   = [];
let checks   = [];
let settings = {scriptUrl:'https://script.google.com/macros/s/AKfycbwPfSnYsJbQpsa6sRIwyGKGsn7NwxAiCUfsl1xqMhd7suuYRgfzN43C2zBhxQ4mhiFMMg/exec', staff:[]};
let checkType    = 'opening';
let checkEntries = {};

async function load(){
  try{const d=localStorage.getItem(SK_KNIVES);  if(d)knives  =JSON.parse(d);}catch(e){}
  try{const d=localStorage.getItem(SK_CHECKS);  if(d)checks  =JSON.parse(d);}catch(e){}
  try{const d=localStorage.getItem(SK_SETTINGS);if(d){const s=JSON.parse(d);settings={...settings,...s};if(!settings.scriptUrl)settings.scriptUrl='https://script.google.com/macros/s/AKfycbwPfSnYsJbQpsa6sRIwyGKGsn7NwxAiCUfsl1xqMhd7suuYRgfzN43C2zBhxQ4mhiFMMg/exec';}}catch(e){}
  document.getElementById('c-date').valueAsDate=new Date();
  document.getElementById('c-time').value=new Date().toTimeString().slice(0,5);
  updateTodayStatus();
  updateSync(settings.scriptUrl?'ready':'local');
  // Always fetch the latest knife register from Sheets so all devices stay in sync
  if(settings.scriptUrl) await fetchKnivesFromSheet();
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

async function fetchKnivesFromSheet(){
  updateSync('syncing');
  try{
    const res=await fetch(settings.scriptUrl+'?action=getKnifeRegister');
    const j=await res.json();
    if(j.result==='success'&&Array.isArray(j.knives)&&j.knives.length){
      knives=j.knives;
      localStorage.setItem(SK_KNIVES,JSON.stringify(knives));
      renderCheckList();
      updateTodayStatus();
    }
    updateSync('ready');
  }catch(e){
    updateSync(knives.length?'ready':'error');
    if(!knives.length) setTimeout(()=>updateSync('local'),3000);
  }
}
function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function fmtTime(t){return t||'—';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function updateSync(state){
  const el=document.getElementById('sync-status');
  const styles={syncing:['◌ syncing','#8a6500'],synced:['✓ synced','#2d6e2d'],error:['✗ error','#c0392b'],local:['● local only','#b0ada5'],ready:['● sheets','#2d6e2d']};
  const[text,color]=styles[state]||styles.ready;
  el.textContent=text;el.style.color=color;
}
function colorDot(color,size=14){
  const c=KNIFE_COLORS[color]||KNIFE_COLORS.yellow;
  return`<span class="color-dot" style="width:${size}px;height:${size}px;background:${c.hex};" title="${c.label}"></span>`;
}

function goCheckStep2(type){
  const date=document.getElementById('c-date').value;
  const time=document.getElementById('c-time').value;
  const staff=document.getElementById('c-staff').value;
  const err=document.getElementById('err-step1');
  const miss=[];
  if(!date)miss.push('date'); if(!time)miss.push('time'); if(!staff)miss.push('staff member');
  if(miss.length){err.style.display='';err.textContent='Please fill in: '+miss.join(', ');return;}
  err.style.display='none';
  checkType=type;
  document.getElementById('ctx-type').textContent=type==='opening'?'▶ Opening check':'■ Closing check';
  document.getElementById('ctx-meta').textContent=fmtDate(date)+' · '+time+' · '+staff;
  document.getElementById('check-step1').style.display='none';
  document.getElementById('check-step2').style.display='';
  resetCheckEntries();
  renderCheckList();
}
function goCheckStep1(){
  document.getElementById('check-step1').style.display='';
  document.getElementById('check-step2').style.display='none';
  updateTodayStatus();
}
function updateTodayStatus(){
  const today=new Date().toISOString().slice(0,10);
  ['opening','closing'].forEach(type=>{
    const el=document.getElementById(type+'-today-status');if(!el)return;
    const done=checks.find(c=>c.date===today&&c.checkType===type);
    if(done){
      const hasIssues=done.entries&&done.entries.some(e=>e.status!=='present-good');
      const issueNote=hasIssues?` · <span style="color:var(--warn-text);">⚠ issues logged</span>`:'';
      el.innerHTML=`<span style="font-size:11px;font-family:monospace;color:var(--success-text);background:var(--success-bg);border:1px solid var(--success-border);border-radius:20px;padding:2px 9px;display:inline-flex;align-items:center;gap:4px;">✓ Done · ${done.time} · ${done.staff}</span>${issueNote}`;
    }else{el.innerHTML='';}
  });
}
function resetCheckEntries(){
  checkEntries={};
  knives.filter(k=>k.status==='active').forEach(k=>{checkEntries[k.id]={status:'unconfirmed',note:'',productionHeld:false};});
}
function renderCheckList(){
  const active=knives.filter(k=>k.status==='active');
  const noMsg=document.getElementById('check-no-knives');
  const list=document.getElementById('check-knife-list');
  if(!active.length){noMsg.style.display='';list.innerHTML='';updateCheckProgress();return;}
  noMsg.style.display='none';
  if(!Object.keys(checkEntries).length)resetCheckEntries();
  list.innerHTML=active.map(k=>buildCheckCard(k)).join('');
  updateCheckProgress();
}
function buildCheckCard(k){
  const entry=checkEntries[k.id]||{status:'unconfirmed',note:'',productionHeld:false};
  const stateClass=entry.status==='present-good'?'state-present':entry.status==='damaged'?'state-damaged':entry.status==='missing'?'state-missing':'';
  const statusIcon=entry.status==='present-good'?'<span style="color:var(--success-text);font-size:18px;">✓</span>':entry.status==='damaged'?'<span style="color:var(--warn-text);font-size:18px;">⚠</span>':entry.status==='missing'?'<span style="color:var(--danger-text);font-size:18px;">✗</span>':'';
  const actionArea=entry.status==='unconfirmed'
    ?`<div style="margin-top:12px;">
        <button class="check-status-btn csb-good" style="width:100%;margin-bottom:6px;" onclick="setPresentGood('${k.id}')"><span class="status-icon">✓</span>Present &amp; Good condition</button>
        <div style="display:flex;gap:6px;">
          <button class="check-status-btn csb-damaged" style="flex:1;" onclick="setDamaged('${k.id}')"><span class="status-icon">⚠</span>Present<span class="status-sub">Damaged</span></button>
          <button class="check-status-btn csb-missing"  style="flex:1;" onclick="setMissing('${k.id}')"> <span class="status-icon">✗</span>Missing<span class="status-sub">Not found</span></button>
        </div>
      </div>`
    :`<div><button class="check-btn-undo" onclick="undoEntry('${k.id}')">Undo</button></div>`;
  const detailForm=entry.status==='damaged'
    ?`<div class="issue-form" style="border-top:1px solid var(--warn-border);">
        <div style="font-size:11px;font-family:monospace;color:var(--warn-text);margin-bottom:6px;letter-spacing:.04em;">DAMAGE DETAILS</div>
        <textarea placeholder="Describe the damage…" oninput="setIssueNote('${k.id}',this.value)" style="width:100%;padding:8px 10px;border:1px solid var(--warn-border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;resize:vertical;min-height:56px;">${entry.note}</textarea>
      </div>`
    :entry.status==='missing'
    ?`<div class="issue-form" style="border-top:1px solid var(--danger-border);">
        <div style="font-size:11px;font-family:monospace;color:var(--danger-text);margin-bottom:6px;letter-spacing:.04em;">MISSING — ACTIONS TAKEN</div>
        <textarea placeholder="Describe actions taken to locate the knife…" oninput="setIssueNote('${k.id}',this.value)" style="width:100%;padding:8px 10px;border:1px solid var(--danger-border);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;resize:vertical;min-height:56px;margin-bottom:8px;">${entry.note}</textarea>
        <div class="production-held-row">
          <input type="checkbox" id="held_${k.id}" ${entry.productionHeld?'checked':''} onchange="setProductionHeld('${k.id}',this.checked)"/>
          <label for="held_${k.id}"><strong>Production held</strong> pending investigation of missing knife</label>
        </div>
      </div>`
    :'';
  return`<div class="check-knife-card ${stateClass}" id="card_${k.id}">
    <div class="check-knife-top">
      ${statusIcon?statusIcon+'&nbsp;':''}${colorDot(k.color)}
      <div class="check-knife-info" style="margin-left:6px;">
        <div class="check-knife-name">${k.id} — ${k.type}</div>
        ${k.description?`<div class="check-knife-sub">${k.description}</div>`:''}
      </div>
    </div>
    ${actionArea}${detailForm}
  </div>`;
}
function setPresentGood(id){checkEntries[id]={status:'present-good',note:'',productionHeld:false};refreshCard(id);updateCheckProgress();}
function setDamaged(id)    {checkEntries[id]={status:'damaged',note:'',productionHeld:false};       refreshCard(id);updateCheckProgress();}
function setMissing(id)    {checkEntries[id]={status:'missing',note:'',productionHeld:true};         refreshCard(id);updateCheckProgress();}
function undoEntry(id)     {checkEntries[id]={status:'unconfirmed',note:'',productionHeld:false};    refreshCard(id);updateCheckProgress();}
function setIssueNote(id,v){checkEntries[id].note=v;}
function setProductionHeld(id,v){checkEntries[id].productionHeld=v;}
function refreshCard(id){const k=knives.find(x=>x.id===id);if(!k)return;const el=document.getElementById('card_'+id);if(el)el.outerHTML=buildCheckCard(k);}
function updateCheckProgress(){
  const active=knives.filter(k=>k.status==='active');
  const confirmed=active.filter(k=>(checkEntries[k.id]||{}).status!=='unconfirmed');
  const total=active.length,done=confirmed.length;
  document.getElementById('check-progress').textContent=total?`${done}/${total}`:'';
  const issues=active.filter(k=>['damaged','missing'].includes((checkEntries[k.id]||{}).status));
  const allGood=total>0&&active.every(k=>(checkEntries[k.id]||{}).status==='present-good');
  const summary=document.getElementById('check-summary');
  if(allGood){summary.textContent=`✓ All ${total} knife${total!==1?'s':''} present & in good condition`;summary.style.color='var(--success-text)';}
  else if(done===total&&issues.length){summary.textContent=`⚠ ${issues.length} issue${issues.length!==1?'s':''} recorded — all confirmed`;summary.style.color='var(--warn-text)';}
  else if(!total){summary.textContent='Add knives in the Setup page first';summary.style.color='var(--text-hint)';}
  else{summary.textContent=`${total-done} knife${total-done!==1?'s':''} remaining`;summary.style.color='var(--text-hint)';}
}
async function submitCheck(){
  const date=document.getElementById('c-date').value;
  const time=document.getElementById('c-time').value;
  const staff=document.getElementById('c-staff').value;
  const notes=document.getElementById('c-notes').value.trim();
  const err=document.getElementById('err-check');
  const active=knives.filter(k=>k.status==='active');
  const miss=[];
  if(!date)miss.push('date'); if(!time)miss.push('time'); if(!staff)miss.push('staff member');
  if(miss.length){err.style.display='';err.textContent='Please fill in: '+miss.join(', ');return;}
  const unconfirmed=active.filter(k=>(checkEntries[k.id]||{}).status==='unconfirmed');
  if(unconfirmed.length){err.style.display='';err.textContent='Please confirm all knives. Remaining: '+unconfirmed.map(k=>k.id).join(', ');return;}
  err.style.display='none';
  const entries=active.map(k=>({knifeId:k.id,...checkEntries[k.id],issueType:checkEntries[k.id].status==='damaged'?'Damaged':checkEntries[k.id].status==='missing'?'Missing':''}));
  const allPresent=entries.every(e=>e.status!=='missing');
  const allGoodCondition=entries.every(e=>e.status==='present-good');
  const productionHeld=entries.some(e=>e.productionHeld);
  const check={id:uid(),date,time,checkType,staff,site:settings.site||'',entries,allPresent,allGoodCondition,productionHeld,notes,savedAt:new Date().toISOString()};
  checks.unshift(check);
  localStorage.setItem(SK_CHECKS,JSON.stringify(checks));
  showToast((checkType==='opening'?'Opening':'Closing')+' check saved ✓');
  document.getElementById('c-notes').value='';
  document.getElementById('c-time').value=new Date().toTimeString().slice(0,5);
  resetCheckEntries();
  goCheckStep1();
  if(settings.scriptUrl){
    updateSync('syncing');
    try{
      const res=await fetch(settings.scriptUrl,{method:'POST',body:JSON.stringify({action:'mergeKnifeCheck',check,knives:knives.filter(k=>k.status==='active')}),headers:{'Content-Type':'text/plain'}});
      const j=await res.json();
      updateSync(j.result==='success'?'synced':'error');
      setTimeout(()=>updateSync('ready'),4000);
    }catch(e){updateSync('error');setTimeout(()=>updateSync(settings.scriptUrl?'ready':'local'),4000);}
  }
}

load();
</script>
</body>
</html>
